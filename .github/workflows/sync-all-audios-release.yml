name: Sync All Audios To Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_url:
        description: Direct URL to all-audios.tar.gz
        required: false
        default: "https://ais-dev-wtvwqvganlaqsrn2wb7gxa-841485514421.europe-west2.run.app/all-audios.tar.gz"
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  sync-audio-archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download archive
        env:
          DEFAULT_URL: https://ais-dev-wtvwqvganlaqsrn2wb7gxa-841485514421.europe-west2.run.app/all-audios.tar.gz
          INPUT_URL: ${{ github.event.inputs.source_url }}
        run: |
          set -euo pipefail
          URL="${INPUT_URL:-$DEFAULT_URL}"
          if [ -z "$URL" ]; then URL="$DEFAULT_URL"; fi
          echo "Using source URL: $URL"
          curl -fL "$URL" -o all-audios.tar.gz
          # Guard against HTML error pages or placeholder files.
          FILE_HEADER=$(xxd -p -l2 all-audios.tar.gz || true)
          if [ "$FILE_HEADER" != "1f8b" ]; then
            echo "Downloaded file is not a gzip archive. Header: $FILE_HEADER"
            exit 1
          fi
          FILE_SIZE=$(stat -c%s all-audios.tar.gz)
          echo "FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          if [ "$FILE_SIZE" -lt 104857600 ]; then
            echo "Downloaded file is too small (<100MB). Size: $FILE_SIZE"
            exit 1
          fi
          echo "FILE_SHA256=$(sha256sum all-audios.tar.gz | awk '{print $1}')" >> $GITHUB_ENV

      - name: Build release notes
        run: |
          SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $FILE_SIZE/1024/1024}")
          {
            echo "Automated sync from source URL."
            echo
            echo "Source: https://ais-dev-wtvwqvganlaqsrn2wb7gxa-841485514421.europe-west2.run.app/all-audios.tar.gz"
            echo "Size: ${SIZE_MB} MB"
            echo "SHA256: ${FILE_SHA256}"
            echo "Updated (UTC): $(date -u +\"%Y-%m-%d %H:%M:%S\")"
          } > release-notes.txt

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: all-audios-latest
          name: All Audios Latest
          body_path: release-notes.txt
          files: all-audios.tar.gz
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: false
          append_body: false
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
